<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zviadi & Naka</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f5f5f2;
  color:#2d2d2d;
}

/* 💎 LANGUAGE SWITCH */
.lang-switch {
  position:fixed;
  top:20px;
  right:30px;
  font-family:'Cormorant Garamond', serif;
  font-size:14px;
  letter-spacing:2px;
  cursor:pointer;
}

.lang-switch span {
  margin:0 5px;
  opacity:0.5;
  transition:0.3s;
}

.lang-switch span.active {
  opacity:1;
  border-bottom:1px solid #4f7c4f;
}

/* 💌 ENVELOPE */
.envelope-screen {
  position:fixed;
  width:100%;
  height:100%;
  background:#3f6f4f;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:100;
  cursor:pointer;
}

.envelope {
  width:240px;
  height:160px;
  background:#5c8a63;
  position:relative;
  border-radius:8px;
}

.flap {
  position:absolute;
  top:-80px;
  border-left:120px solid transparent;
  border-right:120px solid transparent;
  border-bottom:80px solid #4e7a55;
  transform-origin:top;
  transition:1s;
}

.open .flap {
  transform:rotateX(180deg);
}

.open-text {
  color:white;
  margin-top:20px;
  letter-spacing:3px;
}

/* ✨ MAIN */
.main {
  display:none;
}

/* HERO */
.hero {
  text-align:center;
  padding:120px 20px;
}

.names {
  font-family:'Great Vibes', cursive;
  font-size:90px;
}

.text {
  font-family:'Cormorant Garamond', serif;
  font-size:22px;
  max-width:600px;
  margin:20px auto;
}

.date {
  margin-top:10px;
  font-size:18px;
}

/* COUNTDOWN */
.countdown {
  background:#4f7c4f;
  color:white;
  display:flex;
  justify-content:center;
  gap:50px;
  padding:50px;
}

.box { font-size:30px; }
.label { font-size:12px; }

/* 📸 SLIDER */
.slider {
  max-width:600px;
  margin:60px auto;
  position:relative;
}

.slide {
  width:100%;
  height:420px;
  object-fit:cover;
  border-radius:20px;
  display:none;
}

.slide.active {
  display:block;
}

.nav {
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.4);
  color:white;
  border:none;
  font-size:24px;
  padding:10px;
  border-radius:50%;
  cursor:pointer;
}

.prev { left:10px; }
.next { right:10px; }

.dots {
  text-align:center;
  margin-top:15px;
}

.dot {
  height:10px;
  width:10px;
  margin:5px;
  display:inline-block;
  background:#ccc;
  border-radius:50%;
  cursor:pointer;
}

.dot.active {
  background:#4f7c4f;
}

/* DETAILS */
.details {
  text-align:center;
  padding:80px 20px;
}

.cards {
  display:flex;
  justify-content:center;
  gap:60px;
  flex-wrap:wrap;
}

.card {
  max-width:220px;
}

.icon {
  font-size:30px;
}

.btn {
  display:inline-block;
  margin-top:10px;
  padding:8px 16px;
  border:1px solid #4f7c4f;
  color:#4f7c4f;
  text-decoration:none;
}
</style>

</head>

<body>

<!-- LANGUAGE -->

<div class="lang-switch">
  <span onclick="setLang('en')" id="enBtn" class="active">EN</span>
  <span onclick="setLang('ka')" id="kaBtn">KA</span>
</div>

<!-- ENVELOPE -->

<div class="envelope-screen" onclick="openInvite()">
  <div id="env">
    <div class="envelope">
      <div class="flap"></div>
    </div>
    <div class="open-text">OPEN</div>
  </div>
</div>

<!-- MAIN -->

<div class="main" id="main">

  <div class="hero">
    <h1 class="names">Zviadi & Naka</h1>

```
<p class="text">
  With hearts full of love, we invite you to be part of the most special day of our lives 💕
</p>

<p class="date">June 7, 2026</p>
```

  </div>

  <div class="countdown" id="countdown"></div>

  <!-- SLIDER -->

  <div class="slider">
    <img src="photo1.jpg" class="slide active">
    <img src="photo2.jpg" class="slide">
    <img src="photo3.jpg" class="slide">
    <img src="photo4.jpg" class="slide">

```
<button class="nav prev" onclick="prevSlide()">❮</button>
<button class="nav next" onclick="nextSlide()">❯</button>

<div class="dots">
  <span class="dot active" onclick="goTo(0)"></span>
  <span class="dot" onclick="goTo(1)"></span>
  <span class="dot" onclick="goTo(2)"></span>
  <span class="dot" onclick="goTo(3)"></span>
</div>
```

  </div>

  <!-- DETAILS -->

  <div class="details">
    <div class="cards">

```
  <div class="card">
    <div class="icon">⛪</div>
    <h3>Ceremony</h3>
    <p>Sioni Cathedral<br>15:00</p>
    <a class="btn" href="https://maps.google.com?q=Sioni+Cathedral" target="_blank">Map</a>
  </div>

  <div class="card">
    <div class="icon">🥂</div>
    <h3>Celebration</h3>
    <p>Lisi Mere<br>16:00</p>
    <a class="btn" href="https://maps.google.com?q=Lisi+Mere" target="_blank">Map</a>
  </div>

</div>
```

  </div>

</div>

<script>
function openInvite(){
  document.getElementById("env").classList.add("open");
  setTimeout(()=>{
    document.querySelector('.envelope-screen').style.display='none';
    document.getElementById('main').style.display='block';
  },800);
}

/* slider */
let index = 0;
const slides = document.querySelectorAll(".slide");
const dots = document.querySelectorAll(".dot");

function showSlide(i){
  slides.forEach(s=>s.classList.remove("active"));
  dots.forEach(d=>d.classList.remove("active"));
  slides[i].classList.add("active");
  dots[i].classList.add("active");
}

function nextSlide(){
  index = (index+1)%slides.length;
  showSlide(index);
}

function prevSlide(){
  index = (index-1+slides.length)%slides.length;
  showSlide(index);
}

function goTo(i){
  index = i;
  showSlide(index);
}

setInterval(nextSlide,4000);

/* countdown */
const targetDate = new Date("June 7, 2026 15:00:00");

setInterval(()=>{
  const now=new Date();
  const diff=targetDate-now;

  const d=Math.floor(diff/(1000*60*60*24));
  const h=Math.floor((diff/(1000*60*60))%24);
  const m=Math.floor((diff/1000/60)%60);

  document.getElementById("countdown").innerHTML =
    "<div class='box'>"+d+"<div class='label'>DAYS</div></div>"+
    "<div class='box'>"+h+"<div class='label'>HOURS</div></div>"+
    "<div class='box'>"+m+"<div class='label'>MIN</div></div>";
},1000);

/* language */
function setLang(lang){
  if(lang==='ka'){
    document.querySelector(".text").innerText =
      "დიდი სიყვარულით გეპატიჟებით ჩვენი ცხოვრების ყველაზე მნიშვნელოვან დღეს 💕";
    document.querySelector(".date").innerText = "7 ივნისი, 2026";
  } else {
    document.querySelector(".text").innerText =
      "With hearts full of love, we invite you to be part of the most special day of our lives 💕";
    document.querySelector(".date").innerText = "June 7, 2026";
  }
}
</script>

</body>
</html>
