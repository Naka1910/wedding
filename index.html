<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zviadi & Naka</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display', serif;
background:url('background.jpg') center/cover fixed;
color:#2f3e2f;
text-align:center;
}

/* overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,248,236,0.96);
z-index:-1;
}

/* language */
.lang{
position:fixed;
top:20px;
right:20px;
z-index:10;
}
.lang button{
background:none;
border:none;
margin:0 5px;
cursor:pointer;
font-size:13px;
color:#2f3e2f;
opacity:0.6;
}
.lang button.active{
opacity:1;
font-weight:bold;
}

/* envelope */
.envelope{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f8f1e8;
z-index:999;
cursor:pointer;
}
.envelope img{
width:520px;
max-width:90%;
}

/* content */
.content{
display:none;
padding:60px 20px;
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* names */
.names{
font-size:52px;
margin-bottom:10px;
}

.amp{
font-family:'Great Vibes', cursive;
font-size:60px;
margin:0 8px;
}

/* text */
.text{
max-width:520px;
margin:auto;
font-size:19px;
line-height:1.7;
opacity:0.9;
}

/* date */
.date{
margin-top:10px;
font-size:18px;
}

/* locations */
.locations{
margin:30px 0;
font-size:18px;
line-height:1.8;
}

/* slider */
.slider{
position:relative;
max-width:420px;
margin:40px auto;
}
.slide{
display:none;
}
.slide img{
width:100%;
box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

/* arrows */
.prev, .next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(0,0,0,0.4);
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:50%;
}
.prev{left:-10px;}
.next{right:-10px;}

/* countdown */
.countdown{
margin-top:40px;
display:flex;
justify-content:center;
gap:15px;
}
.countdown div{
background:white;
padding:12px 16px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
min-width:60px;
}
.countdown span{
font-size:18px;
font-weight:bold;
display:block;
}

/* mobile */
@media(max-width:600px){
.names{font-size:36px}
.slider{max-width:90%}
}

</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('en')" class="active">EN</button>
<button onclick="setLang('ka')">KA</button>
</div>

<div class="envelope" id="env" onclick="openInvite()">
<img src="envelope.png.png">
</div>

<div class="content" id="content">

<div class="names">
Zviadi <span class="amp">&</span> Naka
</div>

<div class="text" id="text">
With all our love, we invite you to celebrate the most special day of our lives — our wedding.
</div>

<div class="date" id="date">June 7, 2026</div>

<div class="locations" id="locations">
⛪ Sioni Cathedral — 15:00<br>
🥂 Lisi Mere — 17:00
</div>

<div class="slider">
<div class="slide"><img src="photo2.jpg"></div>
<div class="slide"><img src="photo1.jpg"></div>
<div class="slide"><img src="photo3.jpg"></div>
<div class="slide"><img src="photo4.jpg"></div>

<button class="prev" onclick="moveSlide(-1)">❮</button>
<button class="next" onclick="moveSlide(1)">❯</button>
</div>

<div class="countdown">
<div><span id="d"></span><small id="t1">Days</small></div>
<div><span id="h"></span><small id="t2">Hours</small></div>
<div><span id="m"></span><small id="t3">Min</small></div>
<div><span id="s"></span><small id="t4">Sec</small></div>
</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function openInvite(){
document.getElementById("env").style.display="none";
document.getElementById("content").style.display="block";

let music=document.getElementById("music");
music.volume=0;
music.play();

let vol=0;
let fade=setInterval(()=>{
if(vol<1){
vol+=0.05;
music.volume=vol;
}else{
clearInterval(fade);
}
},200);

/* AUTO LANGUAGE */
setTimeout(()=>{
setLang('ka');
},5000);
}

/* slider */
let index=0;
showSlide(index);

function moveSlide(n){
showSlide(index+=n);
}

function showSlide(n){
let slides=document.getElementsByClassName("slide");
if(n>=slides.length) index=0;
if(n<0) index=slides.length-1;

for(let s of slides){s.style.display="none";}
slides[index].style.display="block";
}

/* countdown */
let target=new Date("June 7, 2026 15:00:00").getTime();

setInterval(()=>{
let now=new Date().getTime();
let diff=target-now;

document.getElementById("d").innerHTML=Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerHTML=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
document.getElementById("m").innerHTML=Math.floor((diff%(1000*60*60))/(1000*60));
document.getElementById("s").innerHTML=Math.floor((diff%(1000*60))/1000);
},1000);

/* language */
function setLang(lang){

if(lang==='ka'){
document.getElementById("text").innerHTML="დიდი სიყვარულით გიწვევთ ჩვენი ცხოვრების ყველაზე მნიშვნელოვან დღეს — ჩვენს ქორწილში.";
document.getElementById("date").innerHTML="7 ივნისი, 2026";
document.getElementById("locations").innerHTML="⛪ სიონის ტაძარი — 15:00<br>🥂 ლისი მერე — 17:00";

document.getElementById("t1").innerHTML="დღე";
document.getElementById("t2").innerHTML="საათი";
document.getElementById("t3").innerHTML="წუთი";
document.getElementById("t4").innerHTML="წამი";

}else{
document.getElementById("text").innerHTML="With all our love, we invite you to celebrate the most special day of our lives — our wedding.";
document.getElementById("date").innerHTML="June 7, 2026";
document.getElementById("locations").innerHTML="⛪ Sioni Cathedral — 15:00<br>🥂 Lisi Mere — 17:00";

document.getElementById("t1").innerHTML="Days";
document.getElementById("t2").innerHTML="Hours";
document.getElementById("t3").innerHTML="Min";
document.getElementById("t4").innerHTML="Sec";
}
}

</script>

</body>
</html>
