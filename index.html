<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zviadi & Naka</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f6f1ea;
  color:#2f2f2f;
  text-align:center;
  font-family:'Inter', sans-serif;
}

/* 🌍 LANGUAGE */
.lang{
  position:fixed;
  top:15px;
  right:20px;
  font-size:14px;
}
.lang span{
  margin:0 6px;
  cursor:pointer;
  color:#8c6b4f;
}

/* 💌 ENVELOPE */
.envelope-wrapper{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.envelope-img{
  width:420px;
  max-width:90%;
  border-radius:10px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

.open-text{
  margin-top:15px;
  font-family:'Playfair Display', serif;
  color:#8c6b4f;
}

/* MAIN */
#main{
  display:none;
  padding:30px 20px;
}

/* NAMES */
.names{
  font-family:'Playfair Display', serif;
  font-style:italic;
  font-size:48px;
}

/* TEXT */
.text{
  max-width:420px;
  margin:10px auto;
  font-family:'Playfair Display', serif;
}

/* DATE */
.date{
  margin-top:10px;
  color:#8c6b4f;
}

/* COUNTDOWN */
.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  margin:25px auto;
  max-width:400px;
}
.countdown div{
  font-family:'Playfair Display', serif;
  font-size:24px;
}

/* 📸 SLIDER */
.slider{
  position:relative;
  max-width:260px;
  margin:30px auto;
}

.slider img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
  transition:0.4s;
}

.slider img:hover{
  transform:scale(1.03);
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:26px;
  color:#8c6b4f;
  cursor:pointer;
}

.left{left:-30px;}
.right{right:-30px;}

/* LOCATION */
.location{
  margin-top:40px;
}

.item{
  margin:20px 0;
}

.title{
  font-family:'Playfair Display', serif;
  font-size:20px;
}

.desc{
  font-size:15px;
  color:#7a6a5a;
}

/* MOBILE */
@media(max-width:600px){
  .countdown{
    grid-template-columns:repeat(2,1fr);
  }
}
</style>

</head>

<body>

<!-- 🌍 LANGUAGE -->

<div class="lang">
  <span onclick="setLang('en')">EN</span> |
  <span onclick="setLang('ka')">KA</span>
</div>

<!-- 💌 ENVELOPE -->

<div class="envelope-wrapper" onclick="openInvite()">
  <img src="envelope.png.png" class="envelope-img">
  <div class="open-text" id="openText">Click to Open</div>
</div>

<!-- MAIN -->

<div id="main">

<div class="names">Zviadi & Naka</div>

<div class="text" id="inviteText">
With hearts full of love, we invite you to be part of the most special day of our lives ♡
</div>

<div class="date" id="dateText">June 7, 2026</div>

<!-- COUNTDOWN -->

<div class="countdown">
  <div><span id="d"></span><br>Days</div>
  <div><span id="h"></span><br>Hours</div>
  <div><span id="m"></span><br>Min</div>
  <div><span id="s"></span><br>Sec</div>
</div>

<!-- 📸 SLIDER -->

<div class="slider">
  <span class="arrow left" onclick="prev()">‹</span>
  <img id="slide" src="photo1.jpg">
  <span class="arrow right" onclick="next()">›</span>
</div>

<!-- 📍 LOCATION -->

<div class="location">

<div class="item">
  <div class="title" id="ceremonyTitle">⛪ Ceremony</div>
  <div class="desc">Sioni Cathedral — 15:00</div>
</div>

<div class="item">
  <div class="title" id="partyTitle">🥂 Celebration</div>
  <div class="desc">Lisi Mere — 17:00</div>
</div>

</div>

</div>

<script>
function openInvite(){
  document.querySelector('.envelope-wrapper').style.display='none';
  document.getElementById('main').style.display='block';
}

/* COUNTDOWN */
const target=new Date("June 7, 2026 15:00:00").getTime();

setInterval(()=>{
  const now=new Date().getTime();
  const diff=target-now;

  d.innerText=Math.floor(diff/(1000*60*60*24));
  h.innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  m.innerText=Math.floor((diff%(1000*60*60))/(1000*60));
  s.innerText=Math.floor((diff%(1000*60))/1000);
},1000);

/* SLIDER */
let i=1;
function show(){ document.getElementById("slide").src="photo"+i+".jpg"; }
function next(){ i++; if(i>4)i=1; show(); }
function prev(){ i--; if(i<1)i=4; show(); }

/* LANGUAGE */
function setLang(lang){
  if(lang==='ka'){
    document.getElementById('openText').innerText='გახსნა';
    document.getElementById('inviteText').innerText='დიდი სიყვარულით გეპატიჟებით ჩვენი ცხოვრების ყველაზე მნიშვნელოვან დღეს';
    document.getElementById('dateText').innerText='7 ივნისი, 2026';
    document.getElementById('ceremonyTitle').innerText='⛪ ჯვრისწერა';
    document.getElementById('partyTitle').innerText='🥂 ქორწილი';
  } else {
    document.getElementById('openText').innerText='Click to Open';
    document.getElementById('inviteText').innerText='With hearts full of love, we invite you to be part of the most special day of our lives ♡';
    document.getElementById('dateText').innerText='June 7, 2026';
    document.getElementById('ceremonyTitle').innerText='⛪ Ceremony';
    document.getElementById('partyTitle').innerText='🥂 Celebration';
  }
}
</script>

</body>
</html>
