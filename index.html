<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zviadi & Naka</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cormorant Garamond', serif;
  background:#e8efe9;
  color:#2d2d2d;
  overflow-x:hidden;
}

/* 🌿 FLOATING LEAVES */
.leaf{
  position:fixed;
  width:20px;
  height:20px;
  background:rgba(80,120,80,0.2);
  border-radius:50%;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-100px);}
  100%{transform:translateY(100vh);}
}

/* ================= ENVELOPE ================= */
.envelope-wrapper{
  position:fixed;
  width:100%;
  height:100%;
  background:#e8efe9;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  z-index:100;
}

.envelope3d{
  position:relative;
  width:320px;
  height:200px;
  perspective:1000px;
}

.back{
  position:absolute;
  width:100%;
  height:100%;
  background:url('envelope.png') center/cover no-repeat;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:url('envelope.png') center/cover no-repeat;
  transform-origin:top;
  transition:1s;
}

.letter{
  position:absolute;
  width:90%;
  height:90%;
  background:#fff;
  top:5%;
  left:5%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transform:translateY(40px);
  transition:0.8s;
  box-shadow:0 10px 40px rgba(0,0,0,0.25);
}

.letter h2{
  font-family:'Great Vibes', cursive;
  font-size:32px;
}

.open .flap{
  transform:rotateX(-180deg);
}

.open .letter{
  transform:translateY(-140px);
}

.open-text{
  margin-top:30px;
  font-family:'Great Vibes', cursive;
  font-size:26px;
  color:#a67c52;
}

/* HERO */
.hero{
  text-align:center;
  padding:140px 20px;
  animation:fadeUp 1.5s ease;
}

.names{
  font-family:'Great Vibes', cursive;
  font-size:70px;
}

.text{
  max-width:520px;
  margin:20px auto;
  font-size:20px;
}

.date{
  margin-top:20px;
  font-size:24px;
}

/* COUNTDOWN */
.countdown{
  background:#3f6f4f;
  color:white;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  text-align:center;
  padding:60px 10px;
}

.countdown div{
  font-size:38px;
  transition:0.3s;
}

.countdown div:hover{
  transform:scale(1.1);
}

/* SLIDER */
.slider{
  position:relative;
  max-width:520px;
  margin:80px auto;
}

.slide{
  position:absolute;
  opacity:0;
  transition:1s;
}

.slide img{
  width:100%;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

.active{
  opacity:1;
  position:relative;
}

/* LOCATION */
.location{
  text-align:center;
  padding:100px 20px;
}

.card{
  margin-bottom:50px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

/* MOBILE */
@media(max-width:600px){
  .names{font-size:42px;}
  .countdown{grid-template-columns:repeat(2,1fr);}
}
</style>

</head>

<body>

<!-- LEAVES -->

<script>
for(let i=0;i<20;i++){
  let leaf=document.createElement("div");
  leaf.className="leaf";
  leaf.style.left=Math.random()*100+"vw";
  leaf.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(leaf);
}
</script>

<!-- ENVELOPE -->

<div class="envelope-wrapper" onclick="openEnvelope()">
  <div class="envelope3d">
    <div class="back"></div>
    <div class="letter">
      <h2>Zviadi & Naka</h2>
      <p>June 7, 2026</p>
    </div>
    <div class="flap"></div>
  </div>
  <p class="open-text">Click to Open</p>
</div>

<div id="main" style="display:none">

<!-- HERO -->

<div class="hero">
  <div class="names">Zviadi & Naka</div>
  <div class="text">
    With hearts full of love, we invite you to be part of the most special day of our lives 💕
  </div>
  <div class="date">June 7, 2026</div>
</div>

<!-- COUNTDOWN -->

<div class="countdown">
  <div><span id="d"></span><br>Days</div>
  <div><span id="h"></span><br>Hours</div>
  <div><span id="m"></span><br>Min</div>
  <div><span id="s"></span><br>Sec</div>
</div>

<!-- SLIDER -->

<div class="slider">
  <div class="slide active"><img src="photo1.jpg"></div>
  <div class="slide"><img src="photo2.jpg"></div>
  <div class="slide"><img src="photo3.jpg"></div>
  <div class="slide"><img src="photo4.jpg"></div>
</div>

<!-- LOCATION -->

<div class="location">
  <div class="card">
    <h3>⛪ Ceremony</h3>
    <p>Sioni Cathedral — 15:00</p>
  </div>

  <div class="card">
    <h3>🥂 Celebration</h3>
    <p>Lisi Mere — 16:00</p>
  </div>
</div>

</div>

<script>
function openEnvelope(){
  const wrap=document.querySelector('.envelope-wrapper');
  wrap.classList.add('open');

  setTimeout(()=>{
    wrap.style.display="none";
    document.getElementById('main').style.display='block';
  },1500);
}

/* COUNTDOWN */
const target=new Date("June 7, 2026 15:00:00").getTime();

setInterval(()=>{
  const now=new Date().getTime();
  const diff=target-now;

  document.getElementById("d").innerText=Math.floor(diff/(1000*60*60*24));
  document.getElementById("h").innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  document.getElementById("m").innerText=Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("s").innerText=Math.floor((diff%(1000*60))/1000);
},1000);

/* SLIDER */
let index=0;
const slides=document.querySelectorAll(".slide");

setInterval(()=>{
  slides[index].classList.remove("active");
  index=(index+1)%slides.length;
  slides[index].classList.add("active");
},3500);
</script>

</body>
</html>
