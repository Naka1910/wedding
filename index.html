<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zviadi & Naka</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Playfair Display', serif;
background:url('background.jpg') center/cover fixed;
color:#2f3e2f;
text-align:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,248,236,0.98);
z-index:-1;
}

.lang{
position:fixed;
top:20px;
right:20px;
z-index:10;
}
.lang button{
background:none;
border:none;
margin:0 5px;
cursor:pointer;
font-size:13px;
color:#2f3e2f;
opacity:0.6;
}
.lang button.active{
opacity:1;
font-weight:bold;
}

.envelope{
position:fixed;
top:0;
left:0;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f8f1e8;
z-index:999;
cursor:pointer;
transition:1s ease;
}
.envelope img{
width:520px;
max-width:90%;
}
.envelope.hide{
opacity:0;
pointer-events:none;
}

.content{
display:none;
padding:60px 20px;
animation:fade 1.5s ease;
}
@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

.names{
font-size:52px;
margin-bottom:10px;
word-spacing:8px;
}

.text{
max-width:520px;
margin:auto;
font-size:19px;
line-height:1.7;
}

.date{
margin-top:10px;
font-size:18px;
}

.locations{
margin:30px 0;
font-size:18px;
line-height:1.8;
}

/* 🔥 SLIDER UPDATED */
.slider{
position:relative;
max-width:320px;
margin:40px auto;
}

.slide{
display:none;
}

.slide img{
width:100%;
height:420px;
object-fit:cover;
border-radius:16px;
box-shadow:0 12px 30px rgba(0,0,0,0.25);
}

/* 🔥 NEW ARROWS */
.prev,.next{
position:absolute;
top:50%;
transform:translateY(-50%);
background:rgba(255,255,255,0.7);
color:#2f3e2f;
border:none;
padding:6px 10px;
cursor:pointer;
border-radius:50%;
font-size:14px;
backdrop-filter:blur(5px);
transition:0.3s;
}

.prev:hover,.next:hover{
background:#2f3e2f;
color:white;
}

.prev{left:-10px;}
.next{right:-10px;}

.countdown{
margin-top:40px;
display:flex;
justify-content:center;
gap:15px;
}
.countdown div{
background:white;
padding:12px 16px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
min-width:60px;
}

@media(max-width:600px){
.names{font-size:36px}
.slider{max-width:90%}
.slide img{height:350px;}
}

</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('en')" class="active">EN</button>
<button onclick="setLang('ka')">KA</button>
</div>

<div class="envelope" id="env" onclick="openInvite()">
<img src="envelope.png.png">
</div>

<div class="content" id="content">

<div class="names">Zviadi & Naka</div>

<div class="text" id="text">
With all our love, we invite you to celebrate the most special day of our lives — our wedding.
</div>

<div class="date" id="date">June 7, 2026</div>

<div class="locations" id="locations">
⛪ Sioni Cathedral — 15:00<br>
🥂 Lisi Mere — 17:00
</div>

<div class="slider">
<div class="slide"><img src="photo1.jpg"></div>
<div class="slide"><img src="photo2.jpg"></div>
<div class="slide"><img src="photo4.jpg"></div>

<button class="prev" onclick="moveSlide(-1)">‹</button>
<button class="next" onclick="moveSlide(1)">›</button>
</div>

<div class="countdown">
<div><span id="d"></span><small id="t1">Days</small></div>
<div><span id="h"></span><small id="t2">Hours</small></div>
<div><span id="m"></span><small id="t3">Min</small></div>
<div><span id="s"></span><small id="t4">Sec</small></div>
</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

function openInvite(){
let env=document.getElementById("env");
env.classList.add("hide");

setTimeout(()=>{
env.style.display="none";
content.style.display="block";
},1000);

let music=document.getElementById("music");
music.volume=0;
music.play();

let vol=0;
let fade=setInterval(()=>{
if(vol<1){vol+=0.05; music.volume=vol;}
else{clearInterval(fade);}
},200);

setTimeout(()=>{setLang('ka');},12000);
}

let index=0;
showSlide(index);

function moveSlide(n){showSlide(index+=n);}

function showSlide(n){
let slides=document.getElementsByClassName("slide");
if(n>=slides.length) index=0;
if(n<0) index=slides.length-1;
for(let s of slides){s.style.display="none";}
slides[index].style.display="block";
}

let target=new Date("June 7, 2026 15:00:00").getTime();
setInterval(()=>{
let now=new Date().getTime();
let diff=target-now;
d.innerHTML=Math.floor(diff/(1000*60*60*24));
h.innerHTML=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
m.innerHTML=Math.floor((diff%(1000*60*60))/(1000*60));
s.innerHTML=Math.floor((diff%(1000*60))/1000);
},1000);

function setLang(lang){
if(lang==='ka'){
text.innerHTML="დიდი სიყვარულით გიწვევთ ჩვენი ცხოვრების ყველაზე მნიშვნელოვან დღეს — ჩვენს ქორწილში.";
date.innerHTML="7 ივნისი, 2026";
locations.innerHTML="⛪ სიონის ტაძარი — 15:00<br>🥂 ლისი მერე — 17:00";
t1.innerHTML="დღე"; t2.innerHTML="საათი"; t3.innerHTML="წუთი"; t4.innerHTML="წამი";
}else{
text.innerHTML="With all our love, we invite you to celebrate the most special day of our lives — our wedding.";
date.innerHTML="June 7, 2026";
locations.innerHTML="⛪ Sioni Cathedral — 15:00<br>🥂 Lisi Mere — 17:00";
t1.innerHTML="Days"; t2.innerHTML="Hours"; t3.innerHTML="Min"; t4.innerHTML="Sec";
}
}

</script>

</body>
</html>
