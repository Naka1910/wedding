<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zviadi & Naka</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Cormorant Garamond', serif;
  background:#3f6f4f;
  color:white;
  text-align:center;
}

/* 🌿 LEAVES */
.leaf{
  position:fixed;
  width:10px;
  height:10px;
  background:rgba(255,255,255,0.2);
  border-radius:50%;
  animation:fall linear infinite;
}
@keyframes fall{
  0%{transform:translateY(-50px);}
  100%{transform:translateY(100vh);}
}

/* 💌 ENVELOPE */
.envelope-wrapper{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.envelope-img{
  width:280px;
  transition:0.6s;
}

.envelope-wrapper:hover .envelope-img{
  transform:scale(1.05);
}

.open-text{
  margin-top:20px;
  font-family:'Great Vibes', cursive;
  font-size:26px;
  color:#e8d5b7;
}

/* ✨ MAIN */
#main{
  display:none;
  padding:40px 20px;
}

/* HERO */
.names{
  font-family:'Great Vibes', cursive;
  font-size:48px;
}

.text{
  max-width:400px;
  margin:10px auto;
  font-size:16px;
}

.date{
  margin-top:10px;
  font-size:18px;
}

/* COUNTDOWN */
.countdown{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  margin:30px 0;
}
.countdown div{
  font-size:26px;
}

/* 📸 SLIDER */
.slider{
  position:relative;
  max-width:320px;
  margin:30px auto;
}

.slider img{
  width:100%;
  border-radius:12px;
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  font-size:24px;
  background:rgba(0,0,0,0.3);
  padding:5px 10px;
  cursor:pointer;
}

.left{left:0;}
.right{right:0;}

/* LOCATION */
.location{
  margin-top:30px;
}

.card{
  margin:15px 0;
}

/* MOBILE */
@media(max-width:600px){
  .countdown{grid-template-columns:repeat(2,1fr);}
}
</style>

</head>

<body>

<!-- 🌿 LEAVES -->

<script>
for(let i=0;i<15;i++){
  let leaf=document.createElement("div");
  leaf.className="leaf";
  leaf.style.left=Math.random()*100+"vw";
  leaf.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(leaf);
}
</script>

<!-- 💌 ENVELOPE -->

<div class="envelope-wrapper" onclick="openInvite()">
  <img src="envelope.png" class="envelope-img">
  <div class="open-text">Click to Open</div>
</div>

<!-- ✨ MAIN -->

<div id="main">

<div class="names">Zviadi & Naka</div>

<div class="text">
With hearts full of love, we invite you to be part of the most special day of our lives
</div>

<div class="date">June 7, 2026</div>

<!-- COUNTDOWN -->

<div class="countdown">
  <div><span id="d"></span><br>Days</div>
  <div><span id="h"></span><br>Hours</div>
  <div><span id="m"></span><br>Min</div>
  <div><span id="s"></span><br>Sec</div>
</div>

<!-- SLIDER -->

<div class="slider">
  <span class="arrow left" onclick="prev()">‹</span>
  <img id="slide" src="photo1.jpg">
  <span class="arrow right" onclick="next()">›</span>
</div>

<!-- LOCATION -->

<div class="location">
  <div class="card">
    <h3>Ceremony</h3>
    <p>Sioni Cathedral — 15:00</p>
  </div>

  <div class="card">
    <h3>Celebration</h3>
    <p>Lisi Mere — 16:00</p>
  </div>
</div>

</div>

<script>
function openInvite(){
  document.querySelector('.envelope-wrapper').style.display='none';
  document.getElementById('main').style.display='block';
}

/* COUNTDOWN */
const target=new Date("June 7, 2026 15:00:00").getTime();

setInterval(()=>{
  const now=new Date().getTime();
  const diff=target-now;

  d.innerText=Math.floor(diff/(1000*60*60*24));
  h.innerText=Math.floor((diff%(1000*60*60*24))/(1000*60*60));
  m.innerText=Math.floor((diff%(1000*60*60))/(1000*60));
  s.innerText=Math.floor((diff%(1000*60))/1000);
},1000);

/* SLIDER */
let i=1;

function show(){
  document.getElementById("slide").src="photo"+i+".jpg";
}

function next(){
  i++; if(i>4)i=1;
  show();
}

function prev(){
  i--; if(i<1)i=4;
  show();
}
</script>

</body>
</html>
